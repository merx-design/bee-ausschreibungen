name: Weekly Tender Crawl

on:
  schedule:
    # Every Monday at 06:30 UTC
    - cron: "30 6 * * 1"
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug output"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  crawl:
    name: Crawl SIMAP & DTVP
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run crawler
        run: python scripts/crawl.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/tenders.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Tender Bot"
          git config user.email "bot@merx-design.com"
          git add data/tenders.json
          TENDER_COUNT=$(python3 -c "import json; d=json.load(open('data/tenders.json')); print(d['total'])")
          git commit -m "chore: weekly tender update — ${TENDER_COUNT} Ausschreibungen ($(date +%Y-%m-%d))"
          git push

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No new tenders found — data unchanged."
